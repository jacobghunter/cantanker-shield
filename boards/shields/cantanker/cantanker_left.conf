CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_POINTING=y

# Enable Deep Sleep
CONFIG_ZMK_SLEEP=y
# (Optional) Change the deep sleep timeout. 
# 900000 ms = 15 minutes. 
# 1800000 ms = 30 minutes.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Make Bluetooth stronger to prevent connection drops between halves
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable input subsystem for linker symbols
CONFIG_INPUT=y

CONFIG_ZMK_INPUT_SPLIT=y

# Stronger BT connection so the trackpad feels better
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=4096
