CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable Deep Sleep
CONFIG_ZMK_SLEEP=y
# (Optional) Change the deep sleep timeout. 
# 900000 ms = 15 minutes. 
# 1800000 ms = 30 minutes.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Make Bluetooth stronger to prevent connection drops between halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable input subsystem for mouse movement
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y

# Required for the driver to be enabled
CONFIG_I2C=y
CONFIG_SENSOR=y

# Debug logging
CONFIG_LOG=y
CONFIG_INPUT_LOG_LEVEL_DBG=y
CONFIG_I2C_LOG_LEVEL_DBG=y
