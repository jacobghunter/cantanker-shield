CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Make Bluetooth stronger to prevent connection drops between halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery % to left side
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Enable input subsystem for mouse movement
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y

# Required for the driver to be enabled
CONFIG_I2C=y
CONFIG_ZMK_INPUT_SPLIT=y

# Debug logging
# CONFIG_LOG=y
# CONFIG_INPUT_LOG_LEVEL_DBG=y
# CONFIG_I2C_LOG_LEVEL_DBG=y
