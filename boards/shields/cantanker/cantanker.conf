CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_BUFFER_SIZE=1024
CONFIG_ZMK_KEYBOARD_SCAN=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_POINTING=y

# Enable Deep Sleep
CONFIG_ZMK_SLEEP=y
# (Optional) Change the deep sleep timeout. 
# 900000 ms = 15 minutes. 
# 1800000 ms = 30 minutes.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Make Bluetooth stronger to prevent connection drops between halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable TPS43 sensor driver
CONFIG_ZMK_SENSOR_TPS43=y

# TPS43 specific settings
# Polling rate (10ms = 100Hz)
CONFIG_ZMK_SENSOR_TPS43_POLL_RATE_MS=10
# Maximum simultaneous touches
CONFIG_ZMK_SENSOR_TPS43_MAX_TOUCHES=5
# Touch sensitivity (lower = more sensitive) 
CONFIG_ZMK_SENSOR_TPS43_SENSITIVITY=40
# Enable gesture recognition
CONFIG_ZMK_SENSOR_TPS43_GESTURE_SUPPORT=y

# Required dependencies
# Enable I2C subsystem
CONFIG_I2C=y
# Enable sensor subsystem
CONFIG_SENSOR=y